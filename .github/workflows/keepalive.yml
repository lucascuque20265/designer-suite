name: keepalive

on:
  schedule:
    # Daily at 08:00 AM America/Sao_Paulo (UTC-3).
    # GitHub Actions cron uses UTC, so this is scheduled for 11:00 UTC.
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail
          echo "Pinging $SITE_URL/api/keepalive"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/api/keepalive")
          if [ "$STATUS" -ne 200 ]; then
            echo "Keepalive returned $STATUS"
            # show response body for debugging
            curl -s "$SITE_URL/api/keepalive" || true
            exit 1
          fi
